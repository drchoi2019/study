<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etymology Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfdfe;
            --primary-color: #a7c8e2;   /* Pastel Blue */
            --secondary-color: #ffb7b2; /* Pastel Red/Pink */
            --accent-color: #e2f0cb;    /* Pastel Green */
            --highlight-color: #ffd3b6; /* Pastel Orange */
            --purple-pastel: #d5aaee;   /* Pastel Purple */
            --text-color: #4a4a4a;
            --light-text: #7a7a7a;
            --border-radius: 16px;
            --box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            color: #3b3b3b;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-weight: 300;
            color: var(--light-text);
            font-size: 1.1rem;
        }

        .main-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            gap: 20px;
            margin-bottom: 40px;
        }

        .column {
            flex: 1;
            background: #ffffff;
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        .column-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #555;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 8px;
        }

        .block {
            padding: 6px 8px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 400;
            font-size: 0.9rem;
            transition: var(--transition);
            border: 2px solid transparent;
            user-select: none;
            background-color: #f7f9fc;
            color: #666;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 35px;
        }

        .block:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .block.root-block {
            background-color: #f4f6fb;
        }

        .block.root-block:hover {
            background-color: #eef2fa;
            color: #3b3b3b;
            border-color: var(--primary-color);
        }

        .block.root-block.selected {
            background-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 8px 20px rgba(167, 200, 226, 0.4);
            transform: translateY(-2px);
        }
        
        .block.prefix-block {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Before any root is selected, prefixes look normal but can't be clicked */
        .grid-container.no-root-selected .prefix-block {
            opacity: 1;
            background-color: #fafafa;
        }

        /* Valid prefixes when a root is selected */
        .block.prefix-block.valid-prefix {
            opacity: 1;
            pointer-events: auto;
            background-color: var(--accent-color);
            color: #44582f;
            border-color: #c9e5a1;
            font-weight: 600;
            animation: popIn 0.3s ease-out forwards;
        }

        .block.prefix-block.valid-prefix:hover {
            background-color: #cde4ad;
            color: #334223;
            transform: scale(1.05);
        }

        .root-hint {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 85%;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-word {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 1px;
        }
        
        .modal-breakdown {
            font-size: 1.1rem;
            color: var(--light-text);
            margin-bottom: 25px;
            font-weight: 400;
            background: #fcfcfc;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #efefef;
        }

        .modal-meaning {
            font-size: 1.2rem;
            color: var(--text-color);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .modal-example {
            font-size: 1.05rem;
            color: #5b7da8;
            font-style: italic;
            background: #f0f6fc;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 0;
            font-family: inherit;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #888;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stylish-footer {
            margin-top: auto;
            padding: 30px 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bdc3c7;
            font-weight: 500;
            text-align: center;
            width: 100%;
            user-select: none;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>

        <p class="subtitle">Select a root, then click a highlighted prefix to learn words!</p>

        <!-- Prefixes Column -->

        <!-- Roots Column -->
        <div class="column">

            </div>
        </div>

    <!-- Modal -->

            <div class="modal-breakdown" id="modal-breakdown">prefix + root</div>
            <p class="modal-meaning" id="modal-meaning"></p>
            <p class="modal-example" id="modal-example"></p>
        </div>
    </div>

                "de": { word: "dictate", desc: "To say aloud for writing.", ex: "The boss dictated a letter to his secretary." },
                "en_in": { word: "indict", desc: "To formally say a charge against.", ex: "The jury will indict the thief." },
                "e_ex": { word: "verdict", desc: "To say the truth.", ex: "The jury reached a guilty verdict." }
            },
            "pend": {
                "de": { word: "depend", desc: "To hang down from; rely on.", ex: "Children depend on their parents." },
                "sub": { word: "suspend", desc: "To hang under; temporarily stop.", ex: "The game was suspended due to rain." },
                "ad": { word: "append", desc: "To hang onto; attach.", ex: "I will append a note to the end of the letter." },
                "in_im_il_ir": { word: "impend", desc: "To hang over; be imminent.", ex: "A storm is impending." },
                "e_ex": { word: "expend", desc: "To weigh out; spend.", ex: "Don't expend too much energy on this." }
            },
            "cede_ceed": {
                "re": { word: "recede", desc: "To go backward.", ex: "The flood waters started to recede." },
                "sub": { word: "succeed", desc: "To go under or after; follow up.", ex: "She worked hard to succeed." },
                "e_ex": { word: "exceed", desc: "To go beyond.", ex: "Do not exceed the speed limit." },
                "inter": { word: "intercede", desc: "To go between.", ex: "He had to intercede to stop the fight." },
                "anti": { word: "antecede", desc: "To go before.", ex: "The invention anteceded the computer." }
            },
            "ceive_cept": {
                "re": { word: "receive", desc: "To take back.", ex: "I received a gift." },
                "de": { word: "deceive", desc: "To take away; mislead.", ex: "The magician deceived the audience." },
                "per": { word: "perceive", desc: "To take thoroughly; grasp.", ex: "I can perceive a change in his mood." },
                "con_co": { word: "conceive", desc: "To take into the mind.", ex: "It's hard to conceive of such a big number." },
                "inter": { word: "intercept", desc: "To take between points.", ex: "He intercepted the ball in the game." },
                "ad": { word: "accept", desc: "To take to oneself.", ex: "Please accept my apology." },
                "e_ex": { word: "except", desc: "To take out; exclude.", ex: "Everyone went except me." }
            },
            "rupt": {
                "dis": { word: "disrupt", desc: "To break apart.", ex: "Don't disrupt the class." },
                "inter": { word: "interrupt", desc: "To break between.", ex: "Please don't interrupt me." },
                "e_ex": { word: "erupt", desc: "To break out.", ex: "The volcano is going to erupt." },
                "con_co": { word: "corrupt", desc: "To break with completely; ruin.", ex: "The corrupt mayor was arrested." },
                "ab": { word: "abrupt", desc: "Broken off; sudden.", ex: "The car came to an abrupt stop." }
            },
            "vise_vid": {
                "re": { word: "revise", desc: "To look at again.", ex: "Please revise your essay." },
                "supra": { word: "supervise", desc: "To overlook.", ex: "The teacher will supervise the test." },
                "tele": { word: "televise", desc: "To let see from far.", ex: "They will televise the match live." },
                "ad": { word: "advise", desc: "To look upon; give counsel.", ex: "I advise you to stay home." },
                "pro_pre": { word: "provide", desc: "To look forward; prepare.", ex: "The hotel will provide towels." },
                "dis": { word: "divide", desc: "To separate (see parts).", ex: "Divide the cake into four pieces." }
            },
            "nounce": {
                "ad": { word: "announce", desc: "To bring news to.", ex: "They will announce the winner soon." },
                "pro_pre": { word: "pronounce", desc: "To speak forth.", ex: "How do you pronounce this word?" },
                "de": { word: "denounce", desc: "To speak down; condemn.", ex: "They denounced the bad decision." },
                "re": { word: "renounce", desc: "To call back; give up.", ex: "He decided to renounce his throne." },
                "mis": { word: "mispronounce", desc: "To speak forth incorrectly.", ex: "I often mispronounce his name." }
            }
        };

        // Edge Cases that overlap
        dictionary["cede_ceed"]["pro_pre"] = { word: "precede / proceed", desc: "To go before / To go forward.", ex: "Dinner precedes the movie. / You may proceed." };
        dictionary["spect"]["re"] = { word: "respect / retrospect", desc: "To look back at / A looking back.", ex: "Respect your elders. / In retrospect, it was a bad idea." };

        let currentRoot = null;

        const prefixesGrid = document.getElementById("prefixes-grid");
        const rootsGrid = document.getElementById("roots-grid");

        const modal = document.getElementById("word-modal");
        const modalWord = document.getElementById("modal-word");
        const modalMeaning = document.getElementById("modal-meaning");
        const modalExample = document.getElementById("modal-example");
        const modalBreakdown = document.getElementById("modal-breakdown");
        const closeModal = document.getElementById("close-modal");

        // Render Prefixes
        prefixData.forEach(prefix => {
            const div = document.createElement("div");
            div.className = "block prefix-block";
            div.id = `prefix-${prefix.id}`;
            div.textContent = prefix.label;

            div.addEventListener("click", () => {
                if (currentRoot && div.classList.contains("valid-prefix")) {
                    const data = dictionary[currentRoot][prefix.id];
                    showModal(data.word, prefix.label, rootData.find(r => r.id === currentRoot).label, data.desc, data.ex);
                }
            });

            prefixesGrid.appendChild(div);
        });

        // Render Roots
        rootData.forEach(root => {
            const div = document.createElement("div");
            div.className = "block root-block";
            div.id = `root-${root.id}`;
            
            const textSpan = document.createElement("span");
            textSpan.textContent = root.label;
            
            const hintSpan = document.createElement("span");
            hintSpan.className = "root-hint";
            hintSpan.textContent = `(${root.meaning})`;

            div.appendChild(textSpan);
            div.appendChild(hintSpan);

            div.addEventListener("click", () => {
                selectRoot(root.id, div);
            });

            rootsGrid.appendChild(div);
        });

        function selectRoot(rootId, element) {
            currentRoot = rootId;

            // Remove selected class from all roots
            document.querySelectorAll(".root-block").forEach(el => el.classList.remove("selected"));
            
            // Add selected class to the clicked root
            element.classList.add("selected");

            // Update prefixes grid state
            prefixesGrid.classList.remove("no-root-selected");

            // Clear valid prefixes
            document.querySelectorAll(".prefix-block").forEach(el => {
                el.classList.remove("valid-prefix");
                el.style.animation = 'none';
                el.offsetHeight; /* trigger reflow */
                el.style.animation = null; 
            });

            // Highlight valid prefixes
            const validPrefixes = dictionary[rootId] || {};
            Object.keys(validPrefixes).forEach(prefixId => {
                const pBlock = document.getElementById(`prefix-${prefixId}`);
                if (pBlock) {
                    pBlock.classList.add("valid-prefix");
                }
            });
        }

        function showModal(word, prefixLabel, rootLabel, desc, ex) {
            modalWord.textContent = word;
            modalBreakdown.textContent = `${prefixLabel} + ${rootLabel}`;
            modalMeaning.textContent = desc;
            modalExample.textContent = `"${ex}"`;
            modal.classList.add("active");
        }

        closeModal.addEventListener("click", () => {
            modal.classList.remove("active");
        });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.remove("active");
            }
        });

    </script>
</body>
</html>
